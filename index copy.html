
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
    <style>
            *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #0d00ff, #66ff00, #ff0000, #4a40c0);
    }

    .container{
      background:#ffffff;
      padding:40px;
      width:350px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .container h2{
      text-align:center;
      margin-bottom:25px;
      color:#000000;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      color:#ff0000;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #000000;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#4f46e5;
      box-shadow:0 0 5px rgba(79,70,229,0.4);
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#4f46e5;
      color:white;
      font-size:20px;
      cursor:progress;
      transition:0.3s;
    }

    .btn:hover{
      background:#4338ca;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastro</h1>
        <form id="formulario" method="POST">
            <div class="input-group">
                <label>CPF:</label>
                <input type="text" placeholder="000.000.000-00"><br><br>
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <input type="password" name="Senha" id="Senha" placeholder="Digite sua senha"><br><br>
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input type="email" name="emali" id="email" placeholder="Digite seu email"><br><br>
            </div>
        <button type="submit" class="btn">Enviar</button>
        </form>
    </div>
</body>
</html>
